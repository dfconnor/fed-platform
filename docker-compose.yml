version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rivalrv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rivalrv
      POSTGRES_PASSWORD: rivalrv
      POSTGRES_DB: rivalrv
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rivalrv']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: rivalrv-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://rivalrv:rivalrv@postgres:5432/rivalrv?schema=public
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres-data:
